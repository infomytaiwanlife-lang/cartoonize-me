<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToonMe — Cartoon Avatar Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
  <!-- ⚠️ Replace with your own App Key from enter.pollinations.ai -->
  <script>const APP_KEY = 'pk_yourkey';</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1a2e;
      --paper:  #fffdf4;
      --yellow: #ffd600;
      --red:    #ff3b3b;
      --blue:   #3b82f6;
      --shadow: 5px 5px 0 var(--ink);
      --radius: 10px;
    }

    body {
      background-color: var(--paper);
      background-image: radial-gradient(circle, #ddd 1px, transparent 1px);
      background-size: 24px 24px;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--ink);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 4px solid var(--yellow);
    }

    .logo {
      font-family: 'Bangers', cursive;
      font-size: 2.4rem;
      letter-spacing: 3px;
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--red);
      line-height: 1;
    }
    .logo span { color: var(--red); text-shadow: 3px 3px 0 #c00; }

    .header-sub {
      color: #aaa;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── AUTH BAR ── */
    #auth-bar {
      background: #fff8dc;
      border-bottom: 3px solid var(--yellow);
      padding: 0.7rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    #auth-status {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
    }

    #auth-status .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      display: none;
    }

    #auth-status .user-name {
      font-weight: 800;
      font-size: 0.88rem;
    }

    #auth-status .user-label {
      font-size: 0.75rem;
      color: #888;
    }

    .btn-auth {
      padding: 0.45rem 1.1rem;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.82rem;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-auth.connect {
      background: var(--yellow);
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .btn-auth.connect:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
    .btn-auth.connect:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

    .btn-auth.disconnect {
      background: white;
      color: var(--red);
      box-shadow: 3px 3px 0 #ccc;
    }
    .btn-auth.disconnect:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #ccc; }

    #auth-bar .byop-label {
      font-size: 0.72rem;
      color: #999;
      font-weight: 700;
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 720px) { main { grid-template-columns: 1fr; } }

    /* ── PANEL ── */
    .panel {
      background: white;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-title {
      background: var(--ink);
      color: var(--yellow);
      font-family: 'Bangers', cursive;
      font-size: 1.3rem;
      letter-spacing: 2px;
      padding: 0.6rem 1.2rem;
    }

    .panel-body { padding: 1.2rem; }

    /* ── STYLE GRID ── */
    .style-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .style-btn {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      padding: 0.5rem 0.3rem;
      text-align: center;
      cursor: pointer;
      background: var(--paper);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.78rem;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
      box-shadow: 3px 3px 0 var(--ink);
      line-height: 1.2;
    }

    .style-btn .emoji { font-size: 1.4rem; display: block; margin-bottom: 0.2rem; }

    .style-btn:hover {
      background: #fff0a0;
      transform: translate(-1px,-1px);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .style-btn.active {
      background: var(--yellow);
      transform: translate(2px,2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    /* ── CUSTOM STYLE INPUT ── */
    .custom-style-wrap { margin-bottom: 1rem; }
    .custom-style-wrap label { display: block; font-weight: 800; font-size: 0.82rem; margin-bottom: 0.35rem; }

    #custom-style {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      background: var(--paper);
      box-shadow: 3px 3px 0 var(--ink);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #custom-style:focus { border-color: var(--blue); box-shadow: 3px 3px 0 var(--blue); }

    /* ── DESCRIPTION ── */
    .desc-wrap { margin-bottom: 1rem; }
    .desc-wrap label { display: block; font-weight: 800; font-size: 0.82rem; margin-bottom: 0.35rem; }

    #description {
      width: 100%;
      height: 110px;
      padding: 0.6rem 0.75rem;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      background: var(--paper);
      box-shadow: 3px 3px 0 var(--ink);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #description:focus { border-color: var(--blue); box-shadow: 3px 3px 0 var(--blue); }

    /* ── GENERATE BUTTON ── */
    #generate-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--red);
      color: white;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #generate-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
    #generate-btn:active:not(:disabled) { transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--ink); }
    #generate-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: 3px 3px 0 #aaa; }

    /* ── PROMPT PREVIEW ── */
    #prompt-preview {
      margin-top: 1rem;
      padding: 0.65rem 0.9rem;
      background: var(--paper);
      border: 2px dashed #ccc;
      border-radius: var(--radius);
      font-size: 0.78rem;
      color: #777;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      display: none;
    }
    #prompt-preview strong {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 0.25rem;
    }

    /* ── OUTPUT PANEL ── */
    .output-inner {
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.2rem;
    }

    /* Placeholder */
    .placeholder { text-align: center; color: #bbb; }
    .placeholder .big-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 0.5rem;
      animation: float 3s ease-in-out infinite;
    }
    .placeholder p { font-weight: 700; font-size: 0.9rem; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* Loading */
    .loading-wrap { text-align: center; display: none; }
    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid #eee;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap p { font-weight: 800; font-size: 0.9rem; color: #777; }

    /* Result image */
    #result-img {
      display: none;
      width: 100%;
      max-width: 400px;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      animation: pop-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop-in {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    /* Error */
    #error-msg {
      display: none;
      background: #fff0f0;
      border: 3px solid var(--red);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: var(--red);
      font-weight: 800;
      font-size: 0.85rem;
      text-align: center;
      width: 100%;
    }

    /* Download */
    #download-btn {
      display: none;
      padding: 0.6rem 1.4rem;
      background: #22c55e;
      color: white;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      font-family: 'Bangers', cursive;
      font-size: 1.1rem;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #download-btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }

    /* Meta */
    #result-meta {
      display: none;
      font-size: 0.78rem;
      font-weight: 700;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="logo">Toon<span>Me</span></div>
      <div class="header-sub">AI Cartoon Avatar Generator!!</div>
    </div>
  </header>

  <!-- BYOP Auth Bar -->
  <div id="auth-bar">
    <div id="auth-status">
      <img class="avatar" id="user-avatar" alt="" />
      <div>
        <div class="user-name" id="user-name">Not connected</div>
        <div class="user-label">Connect to use your own Pollinations pollen</div>
      </div>
    </div>
    <button class="btn-auth connect" id="btn-connect" onclick="connectPollinations()">
      🌼 Connect with Pollinations
    </button>
    <button class="btn-auth disconnect" id="btn-disconnect" style="display:none" onclick="disconnect()">
      Disconnect
    </button>
    <span class="byop-label">Powered by BYOP</span>
  </div>

  <main>
    <!-- LEFT: Controls -->
    <div>
      <div class="panel" style="margin-bottom:1.5rem">
        <div class="panel-title">🎨 Pick a Style</div>
        <div class="panel-body">
          <div class="style-grid" id="style-grid"></div>
          <div class="custom-style-wrap">
            <label for="custom-style">✏️ Or type your own style</label>
            <input
              id="custom-style"
              type="text"
              placeholder="e.g. Studio Ghibli, Pixar, Looney Tunes…"
              oninput="onCustomStyleInput()"
            />
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">🧑 Describe Yourself</div>
        <div class="panel-body">
          <div class="desc-wrap">
            <label for="description">Physical appearance, outfit, expression…</label>
            <textarea
              id="description"
              placeholder="e.g. tall person with curly red hair, glasses, wearing a blue hoodie, happy expression"
            ></textarea>
          </div>
          <button id="generate-btn" onclick="generate()">⚡ GENERATE AVATAR</button>
          <div id="prompt-preview">
            <strong>Prompt sent to API</strong>
            <span id="prompt-text"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Output -->
    <div class="panel">
      <div class="panel-title">🖼️ Your Cartoon Avatar</div>
      <div class="output-inner" id="output">
        <div class="placeholder" id="placeholder">
          <span class="big-emoji">🎭</span>
          <p>Pick a style and describe yourself,<br>then hit Generate!</p>
        </div>
        <div class="loading-wrap" id="loading">
          <div class="spinner"></div>
          <p>Drawing your cartoon…</p>
        </div>
        <img id="result-img" alt="Generated cartoon avatar" />
        <div id="error-msg"></div>
        <a id="download-btn" download="toonme-avatar.jpg">⬇ Download Avatar</a>
        <div id="result-meta"></div>
      </div>
    </div>
  </main>

  <script>
    // ── STYLES DATA ──────────────────────────────────────────────────────────
    const STYLES = [
      {
        id: 'simpsons',
        label: 'The Simpsons',
        emoji: '🟡',
        prompt: 'in the style of The Simpsons animated cartoon, yellow skin, overbite, simple design, Matt Groening art style'
      },
      {
        id: 'southpark',
        label: 'South Park',
        emoji: '🧢',
        prompt: 'in the style of South Park animated show, simple flat cutout cartoon character, Trey Parker Matt Stone art style'
      },
      {
        id: 'pokemon',
        label: 'Pokémon',
        emoji: '⚡',
        prompt: 'as a Pokémon trainer character, in the style of Pokémon anime, Ken Sugimori art style, vibrant colors, clean lines'
      },
      {
        id: 'disney',
        label: 'Disney',
        emoji: '🏰',
        prompt: 'in the style of classic Disney animation, expressive eyes, clean lines, vibrant Disney art style, hand-drawn look'
      },
      {
        id: 'manga',
        label: 'Manga / Anime',
        emoji: '🎌',
        prompt: 'as a manga anime character, large expressive eyes, Japanese anime art style, clean ink line art, cel shading'
      },
      {
        id: 'pixar',
        label: 'Pixar 3D',
        emoji: '🎬',
        prompt: 'in the style of Pixar 3D animated movie character, highly detailed, expressive, soft cinematic lighting, subsurface scattering'
      },
      {
        id: 'looney',
        label: 'Looney Tunes',
        emoji: '🐰',
        prompt: 'in the style of classic Looney Tunes cartoon, exaggerated rubbery features, Warner Bros classic animation, bold outlines'
      },
      {
        id: 'adventure',
        label: 'Adventure Time',
        emoji: '🗡️',
        prompt: 'in the style of Adventure Time cartoon, simple rounded shapes, flat bright colors, Pendleton Ward art style'
      },
      {
        id: 'custom',
        label: 'Custom…',
        emoji: '✨',
        prompt: null
      }
    ];

    let selectedStyleId = null;
    let apiKey = null;

    // ── INIT ─────────────────────────────────────────────────────────────────
    function init() {
      renderStyleGrid();
      handleRedirectKey();   // check URL fragment first (coming back from auth)
      restoreSession();      // then check localStorage
      updateAuthUI();
    }

    // ── BYOP AUTH ─────────────────────────────────────────────────────────────
    // Step 1: redirect user to Pollinations authorize screen
    function connectPollinations() {
      const params = new URLSearchParams({
        redirect_url: location.href.split('#')[0], // clean URL, no stale fragment
        app_key: APP_KEY,
      });
      window.location.href = `https://enter.pollinations.ai/authorize?${params}`;
    }

    // Step 2: on return, grab key from URL fragment (#api_key=sk_...)
    // Fragment never hits server logs — it's client-only. Safe.
    function handleRedirectKey() {
      const raw = location.hash; // e.g. "#api_key=sk_abc123"
      if (!raw || !raw.includes('api_key=')) return;

      // Regex is safer than URLSearchParams here — avoids encoding edge cases
      const match = raw.match(/[#&]api_key=([^&]+)/);
      if (!match) return;
      const key = decodeURIComponent(match[1]);
      if (!key) return;

      apiKey = key;
      localStorage.setItem('pollinations_key', apiKey);

      // Clean the fragment so a reload doesn't re-process it
      history.replaceState(null, '', location.pathname + location.search);

      fetchUserInfo();
    }

    function restoreSession() {
      if (apiKey) return; // already set from redirect
      const stored = localStorage.getItem('pollinations_key');
      if (!stored) return;
      apiKey = stored;
      const name = localStorage.getItem('pollinations_user_name');
      const pic  = localStorage.getItem('pollinations_user_pic');
      if (name) renderUserInfo(name, pic);
    }

    function disconnect() {
      apiKey = null;
      localStorage.removeItem('pollinations_key');
      localStorage.removeItem('pollinations_user_name');
      localStorage.removeItem('pollinations_user_pic');
      updateAuthUI();
    }

    // Optional: fetch the user's display name + avatar to show in the bar
    async function fetchUserInfo() {
      try {
        const res = await fetch('https://enter.pollinations.ai/api/device/userinfo', {
          headers: { 'Authorization': `Bearer ${apiKey}` }
        });
        if (!res.ok) return;
        const data = await res.json();
        const name = data.name || data.preferred_username || 'Connected';
        const pic  = data.picture || '';
        localStorage.setItem('pollinations_user_name', name);
        localStorage.setItem('pollinations_user_pic', pic);
        renderUserInfo(name, pic);
      } catch {
        // Non-fatal: we still have the key, just no display name
        updateAuthUI();
      }
    }

    function renderUserInfo(name, pic) {
      document.getElementById('user-name').textContent = `✅ ${name}`;
      const avatar = document.getElementById('user-avatar');
      if (pic) { avatar.src = pic; avatar.style.display = 'block'; }
      updateAuthUI();
    }

    function updateAuthUI() {
      const connected = !!apiKey;
      document.getElementById('btn-connect').style.display    = connected ? 'none'         : 'inline-block';
      document.getElementById('btn-disconnect').style.display = connected ? 'inline-block' : 'none';
      if (!connected) {
        document.getElementById('user-name').textContent = 'Not connected';
        document.getElementById('user-avatar').style.display = 'none';
      }
    }

    // ── STYLE SELECTION ───────────────────────────────────────────────────────
    function selectStyle(id) {
      selectedStyleId = id;
      document.querySelectorAll('.style-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.id === id);
      });
      if (id !== 'custom') {
        document.getElementById('custom-style').value = '';
      }
    }

    function onCustomStyleInput() {
      const val = document.getElementById('custom-style').value.trim();
      if (val) {
        selectStyle('custom');
      } else if (selectedStyleId === 'custom') {
        selectedStyleId = null;
        document.querySelectorAll('.style-btn').forEach(btn => btn.classList.remove('active'));
      }
    }

    // ── PROMPT BUILDER ────────────────────────────────────────────────────────
    function buildPrompt() {
      const description = document.getElementById('description').value.trim();
      const customStyle = document.getElementById('custom-style').value.trim();

      if (!description) throw new Error('Please describe yourself first.');
      if (!selectedStyleId) throw new Error('Please pick a cartoon style.');

      let stylePrompt;
      if (selectedStyleId === 'custom') {
        if (!customStyle) throw new Error('Enter a custom style or pick a preset.');
        stylePrompt = `in the style of ${customStyle} cartoon animation`;
      } else {
        stylePrompt = STYLES.find(s => s.id === selectedStyleId).prompt;
      }

      return `cartoon avatar portrait of a person, ${description}, ${stylePrompt}, character art, clean illustration, white background`;
    }

    // ── GENERATE ──────────────────────────────────────────────────────────────
    async function generate() {
      if (!apiKey) {
        showError('Connect your Pollinations account first using the button above.');
        return;
      }

      let prompt;
      try {
        prompt = buildPrompt();
      } catch (e) {
        showError(e.message);
        return;
      }

      setLoading(true);
      showPromptPreview(prompt);

      // Random seed so re-generating always yields a different result.
      const seed = Math.floor(Math.random() * 999999);
      // image.pollinations.ai is the direct image endpoint; key goes as query param.
      const url = [
        'https://image.pollinations.ai/prompt/',
        encodeURIComponent(prompt),
        '?width=512&height=512&model=flux&nologo=true',
        '&seed=', seed,
        '&key=', encodeURIComponent(apiKey)
      ].join('');

      try {
        await loadImage(url);
        showResult(url);
      } catch {
        showError('Generation failed. Double-check your API key and try again.');
      } finally {
        // Only re-enable the button; do NOT touch placeholder visibility here —
        // showResult / showError already manage that correctly.
        document.getElementById('generate-btn').disabled = false;
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Wraps img.src load in a promise so we can await it cleanly.
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = document.getElementById('result-img');
        const timer = setTimeout(() => reject(new Error('Timeout')), 90000);
        img.onload  = () => { clearTimeout(timer); resolve(); };
        img.onerror = () => { clearTimeout(timer); reject(new Error('Load error')); };
        img.src = src;
      });
    }

    // ── UI STATE HELPERS ──────────────────────────────────────────────────────
    function setLoading(on) {
      document.getElementById('loading').style.display     = on ? 'block' : 'none';
      document.getElementById('placeholder').style.display = on ? 'none'  : '';
      document.getElementById('generate-btn').disabled     = on;
      if (on) {
        document.getElementById('result-img').style.display   = 'none';
        document.getElementById('error-msg').style.display    = 'none';
        document.getElementById('download-btn').style.display = 'none';
        document.getElementById('result-meta').style.display  = 'none';
        document.getElementById('placeholder').style.display  = 'none';
      }
    }

    function showResult(url) {
      document.getElementById('result-img').style.display = 'block';

      const dl = document.getElementById('download-btn');
      dl.href = url;
      dl.style.display = 'inline-block';

      const styleLabel = selectedStyleId === 'custom'
        ? document.getElementById('custom-style').value.trim()
        : STYLES.find(s => s.id === selectedStyleId)?.label;

      const meta = document.getElementById('result-meta');
      meta.textContent = `Style: ${styleLabel} • 512×512 • Powered by Pollinations AI`;
      meta.style.display = 'block';

      document.getElementById('placeholder').style.display = 'none';
    }

    function showError(msg) {
      setLoading(false);
      document.getElementById('error-msg').textContent = '⚠️ ' + msg;
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
    }

    function showPromptPreview(prompt) {
      document.getElementById('prompt-text').textContent = prompt;
      document.getElementById('prompt-preview').style.display = 'block';
    }

    // ── BOOT ──────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
