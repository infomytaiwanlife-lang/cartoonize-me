<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToonMe — Cartoon Avatar Generator</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
  <!-- ⚠️ Replace with your own App Key from enter.pollinations.ai -->
  <script>const APP_KEY = 'pk_yourkey';</script>
</head>
<body>

  <header>
    <div>
      <div class="logo">Toon<span>Me</span></div>
      <div class="header-sub">AI Cartoon Avatar Generator</div>
    </div>
  </header>

  <!-- BYOP Auth Bar -->
  <div id="auth-bar">
    <div id="auth-status">
      <img class="avatar" id="user-avatar" alt="" />
      <div>
        <div class="user-name" id="user-name">Not connected</div>
        <div class="user-label">Connect to use your own Pollinations pollen</div>
      </div>
    </div>
    <button class="btn-auth connect" id="btn-connect" onclick="connectPollinations()">
      🌼 Connect with Pollinations
    </button>
    <button class="btn-auth disconnect" id="btn-disconnect" style="display:none" onclick="disconnect()">
      Disconnect
    </button>
    <span class="byop-label">Powered by BYOP</span>
  </div>

  <!-- DEBUG PANEL — remove before shipping -->
  <div id="debug-output" style="display:none; background:#1a1a2e; color:#ffd600; font-family:monospace; font-size:0.8rem; padding:0.75rem 2rem; border-bottom:3px solid #ffd600;"></div>

  <main>
    <!-- LEFT: Controls -->
    <div>
      <div class="panel" style="margin-bottom:1.5rem">
        <div class="panel-title">🎨 Pick a Style</div>
        <div class="panel-body">
          <div class="style-grid" id="style-grid"></div>
          <div class="custom-style-wrap">
            <label for="custom-style">✏️ Or type your own style</label>
            <input
              id="custom-style"
              type="text"
              placeholder="e.g. Studio Ghibli, Pixar, Looney Tunes…"
              oninput="onCustomStyleInput()"
            />
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">🧑 Describe Yourself</div>
        <div class="panel-body">
          <div class="desc-wrap">
            <label for="description">Physical appearance, outfit, expression…</label>
            <textarea
              id="description"
              placeholder="e.g. tall person with curly red hair, glasses, wearing a blue hoodie, happy expression"
            ></textarea>
          </div>
          <button id="generate-btn" onclick="generate()">⚡ GENERATE AVATAR</button>
          <div id="prompt-preview">
            <strong>Prompt sent to API</strong>
            <span id="prompt-text"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Output -->
    <div class="panel">
      <div class="panel-title">🖼️ Your Cartoon Avatar</div>
      <div class="output-inner" id="output">
        <div class="placeholder" id="placeholder">
          <span class="big-emoji">🎭</span>
          <p>Pick a style and describe yourself,<br>then hit Generate!</p>
        </div>
        <div class="loading-wrap" id="loading">
          <div class="spinner"></div>
          <p>Drawing your cartoon…</p>
        </div>
        <img id="result-img" alt="Generated cartoon avatar" />
        <div id="error-msg"></div>
        <a id="download-btn" download="toonme-avatar.jpg">⬇ Download Avatar</a>
        <div id="result-meta"></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
